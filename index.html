<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Gym Kalender</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .calendar-container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 15px;
      border-radius: 8px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    button {
      padding: 5px 10px;
      cursor: pointer;
    }

    .weekdays, .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .weekdays div {
      font-weight: bold;
      padding: 5px 0;
    }

    .day {
      padding: 15px;
      margin: 2px;
      background: #eee;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
    }

    .day:hover {
      background: #ddd;
    }

    .gym {
      background: #4caf50;
      color: white;
      font-weight: bold;
    }

    .empty {
      background: transparent;
      cursor: default;
    }
  </style>
</head>
<body>

<h1>🏋️ Gym Kalender</h1>

<div class="calendar-container">
  <div class="calendar-header">
    <button onclick="changeMonth(-1)">◀</button>
    <div id="monthYear"></div>
    <button onclick="changeMonth(1)">▶</button>
  </div>

  <div class="weekdays">
    <div>Mo</div><div>Di</div><div>Mi</div>
    <div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
  </div>

  <div class="calendar" id="calendar"></div>
</div>

<script>
  const calendarEl = document.getElementById("calendar");
  const monthYearEl = document.getElementById("monthYear");

  let date = new Date();

  const gymDays = JSON.parse(localStorage.getItem("gymDays")) || {};

  function renderCalendar() {
    calendarEl.innerHTML = "";

    const year = date.getFullYear();
    const month = date.getMonth();

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    monthYearEl.textContent = date.toLocaleString("de-DE", {
      month: "long",
      year: "numeric"
    });

    const startDay = (firstDay === 0) ? 6 : firstDay - 1;

    for (let i = 0; i < startDay; i++) {
      const empty = document.createElement("div");
      empty.classList.add("day", "empty");
      calendarEl.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const div = document.createElement("div");
      div.classList.add("day");
      div.textContent = day;

      const key = `${year}-${month + 1}-${day}`;

      if (gymDays[key]) {
        div.classList.add("gym");
      }

      div.onclick = () => {
        if (gymDays[key]) {
          delete gymDays[key];
          div.classList.remove("gym");
        } else {
          gymDays[key] = true;
          div.classList.add("gym");
        }
        localStorage.setItem("gymDays", JSON.stringify(gymDays));
      };

      calendarEl.appendChild(div);
    }
  }

  function changeMonth(direction) {
    date.setMonth(date.getMonth() + direction);
    renderCalendar();
  }

  renderCalendar();
</script>

<!-- ===== PATCH: Gym Monats-Zähler ===== -->

<p id="gymCounter" style="
  text-align: center;
  font-weight: bold;
  margin-top: 15px;
  font-size: 18px;
">
  GYM besucht: 0‑mal im Monat
</p>

<script>
  (function () {
    const gymCounterEl = document.getElementById("gymCounter");

    if (!gymCounterEl) return;

    const gymDays =
      JSON.parse(localStorage.getItem("gymDays")) || {};

    function updateGymCounter() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1;

      let count = 0;

      for (const key in gymDays) {
        const [y, m] = key.split("-").map(Number);
        if (y === year && m === month) {
          count++;
        }
      }

      gymCounterEl.textContent =
        `GYM besucht: ${count}‑mal im Monat`;
    }

    updateGymCounter();

    // 🔁 Aktualisieren, falls Kalender neu gerendert wird
    window.addEventListener("storage", updateGymCounter);
  })();
</script>

<!-- ===== PATCH: Gym-Zähler für aktuellen Kalender-Monat ===== -->

<p id="gymCounter" style="
  text-align: center;
  font-weight: bold;
  margin-top: 15px;
  font-size: 18px;
">
  GYM besucht: 0‑mal im Monat
</p>

<script>
(function () {
  const gymCounterEl = document.getElementById("gymCounter");
  if (!gymCounterEl) return;

  const gymDays = JSON.parse(localStorage.getItem("gymDays")) || {};

  function getDisplayedMonthYear() {
    const label = document.getElementById("monthYear");
    if (!label) return null;

    // Beispiel: "April 2026"
    const parts = label.textContent.trim().split(" ");
    const monthName = parts[0];
    const year = parseInt(parts[1]);

    const monthMap = {
      Januar: 1, Februar: 2, März: 3, April: 4,
      Mai: 5, Juni: 6, Juli: 7, August: 8,
      September: 9, Oktober: 10, November: 11, Dezember: 12
    };

    return { year, month: monthMap[monthName] };
  }

  function updateGymCounter() {
    const current = getDisplayedMonthYear();
    if (!current) return;

    let count = 0;

    for (const key in gymDays) {
      const [y, m] = key.split("-").map(Number);
      if (y === current.year && m === current.month) {
        count++;
      }
    }

    gymCounterEl.textContent =
      `GYM besucht: ${count}‑mal im Monat`;
  }

  // ✅ regelmäßig neu zählen (Monatswechsel, Klicks)
  setInterval(updateGymCounter, 300);
})();
</script>
