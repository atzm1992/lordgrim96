<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Gym Kalender</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .calendar-container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 15px;
      border-radius: 8px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    button {
      padding: 5px 10px;
      cursor: pointer;
    }

    .weekdays, .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .weekdays div {
      font-weight: bold;
      padding: 5px 0;
    }

    .day {
      padding: 15px;
      margin: 2px;
      background: #eee;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
    }

    .day:hover {
      background: #ddd;
    }

    .gym {
      background: #4caf50;
      color: white;
      font-weight: bold;
    }

    .empty {
      background: transparent;
      cursor: default;
    }
  </style>
</head>
<body>

<h1>🏋️ Gym Kalender</h1>

<div class="calendar-container">
  <div class="calendar-header">
    <button onclick="changeMonth(-1)">◀</button>
    <div id="monthYear"></div>
    <button onclick="changeMonth(1)">▶</button>
  </div>

  <div class="weekdays">
    <div>Mo</div><div>Di</div><div>Mi</div>
    <div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
  </div>

  <div class="calendar" id="calendar"></div>
</div>

<script>
  const calendarEl = document.getElementById("calendar");
  const monthYearEl = document.getElementById("monthYear");

  let date = new Date();

  const gymDays = JSON.parse(localStorage.getItem("gymDays")) || {};

  function renderCalendar() {
    calendarEl.innerHTML = "";

    const year = date.getFullYear();
    const month = date.getMonth();

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    monthYearEl.textContent = date.toLocaleString("de-DE", {
      month: "long",
      year: "numeric"
    });

    const startDay = (firstDay === 0) ? 6 : firstDay - 1;

    for (let i = 0; i < startDay; i++) {
      const empty = document.createElement("div");
      empty.classList.add("day", "empty");
      calendarEl.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const div = document.createElement("div");
      div.classList.add("day");
      div.textContent = day;

      const key = `${year}-${month + 1}-${day}`;

      if (gymDays[key]) {
        div.classList.add("gym");
      }

      div.onclick = () => {
        if (gymDays[key]) {
          delete gymDays[key];
          div.classList.remove("gym");
        } else {
          gymDays[key] = true;
          div.classList.add("gym");
        }
        localStorage.setItem("gymDays", JSON.stringify(gymDays));
      };

      calendarEl.appendChild(div);
    }
  }

  function changeMonth(direction) {
    date.setMonth(date.getMonth() + direction);
    renderCalendar();
  }

  renderCalendar();
</script>


<!-- PATCH START -->
<!-- ===== PATCH: Stabiler Monats-Gym-Zähler (MutationObserver) ===== -->

<p id="monthlyGymCount" style="
  text-align: center;
  font-weight: bold;
  margin-top: 15px;
  font-size: 18px;
">
  Im Monat war ich 0‑mal im Gym
</p>

<script>
(function () {
  const counterEl = document.getElementById("monthlyGymCount");
  const calendarEl = document.getElementById("calendar");
  const monthLabel = document.getElementById("monthYear");

  if (!counterEl || !calendarEl || !monthLabel) return;

  const monthMap = {
    Januar: 1, Februar: 2, März: 3, April: 4,
    Mai: 5, Juni: 6, Juli: 7, August: 8,
    September: 9, Oktober: 10, November: 11, Dezember: 12
  };

  function updateCounter() {
    const gymDays = JSON.parse(localStorage.getItem("gymDays")) || {};
    const [monthName, yearText] = monthLabel.textContent.trim().split(" ");
    const year = parseInt(yearText, 10);
    const month = monthMap[monthName];

    let count = 0;
    for (const key in gymDays) {
      const [y, m] = key.split("-").map(Number);
      if (y === year && m === month) count++;
    }

    counterEl.textContent =
      `Im Monat war ich ${count}‑mal im Gym`;
  }

  // 🔥 Beobachtet ALLE Änderungen im Kalender
  const observer = new MutationObserver(updateCounter);
  observer.observe(calendarEl, {
    childList: true,
    subtree: true,
    attributes: true
  });

  // Initial einmal berechnen
  updateCounter();
})();
</script>

<!-- ===== PATCH ENDE ===== -->

<!-- PATCH END -->

<!-- ===== PATCH: Einfaches Login-System ===== -->

<style>
  #loginOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  #loginBox {
    background: white;
    padding: 20px;
    border-radius: 8px;
    width: 280px;
    text-align: center;
  }

  #loginBox input {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
  }

  #loginBox button {
    width: 100%;
    padding: 8px;
    font-weight: bold;
    cursor: pointer;
  }

  #logoutBtn {
    margin: 10px auto;
    display: block;
  }
</style>

<div id="loginOverlay">
  <div id="loginBox">
    <h3>🔒 Login</h3>
    <input id="username" placeholder="Name">
    <input id="password" type="password" placeholder="Passwort">
    <button onclick="login()">Anmelden</button>
    <p id="loginError" style="color:red;"></p>
  </div>
</div>

<button id="logoutBtn" onclick="logout()">Logout</button>

<script>
(function () {
  const LOGIN_USER = "gym";      // 👈 HIER Benutzername ändern
  const LOGIN_PASS = "1234";     // 👈 HIER Passwort ändern

  const overlay = document.getElementById("loginOverlay");
  const logoutBtn = document.getElementById("logoutBtn");
  const errorEl = document.getElementById("loginError");

  function checkLogin() {
    if (localStorage.getItem("loggedIn") === "true") {
      overlay.style.display = "none";
      logoutBtn.style.display = "block";
    } else {
      overlay.style.display = "flex";
      logoutBtn.style.display = "none";
    }
  }

  window.login = function () {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === LOGIN_USER && pass === LOGIN_PASS) {
      localStorage.setItem("loggedIn", "true");
      checkLogin();
    } else {
      errorEl.textContent = "Falsche Daten";
    }
  };

  window.logout = function () {
    localStorage.removeItem("loggedIn");
    location.reload();
  };

  checkLogin();
})();
</script>

<!-- ===== PATCH ENDE ===== -->
<!-- PATCH END -->
</body>
</html>
