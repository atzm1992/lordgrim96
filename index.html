<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Gym Kalender</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      max-width: 500px;
      margin: 20px auto;
    }

    .day {
      background: white;
      padding: 15px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
    }

    .day:hover {
      background: #ddd;
    }

    .gym {
      background: #4caf50;
      color: white;
      font-weight: bold;
    }

    .info {
      text-align: center;
      margin-top: 20px;
      color: #555;
    }
  </style>
</head>
<body>

<h1>🏋️ Gym Kalender</h1>
<p class="info">Klicke auf einen Tag, wenn du im Gym warst</p>

<div class="calendar" id="calendar"></div>

<script>
  const calendar = document.getElementById("calendar");
  const gymDays = JSON.parse(localStorage.getItem("gymDays")) || [];

  for (let day = 1; day <= 30; day++) {
    const div = document.createElement("div");
    div.classList.add("day");
    div.textContent = day;

    if (gymDays.includes(day)) {
      div.classList.add("gym");
    }

    div.addEventListener("click", () => {
      if (gymDays.includes(day)) {
        div.classList.remove("gym");
        gymDays.splice(gymDays.indexOf(day), 1);
      } else {
        div.classList.add("gym");
        gymDays.push(day);
      }
      localStorage.setItem("gymDays", JSON.stringify(gymDays));
    });

    calendar.appendChild(div);
  }
</script>

</body>
</html>
