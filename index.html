<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Gym Kalender</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    #appContent {
      display: none;
    }

    .calendar-container {
      background: white;
      padding: 15px;
      border-radius: 10px;
      max-width: 420px;
      margin: 0 auto;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .weekdays,
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .weekdays div {
      font-weight: bold;
    }

    .day {
      background: #eee;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .day.gym {
      background: #4caf50;
      color: white;
      font-weight: bold;
    }

    /* LOGIN */
    #loginOverlay {
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #loginBox {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      width: 280px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
    }

    #loginBox input {
      width: 100%;
      margin: 8px 0;
      padding: 8px;
    }

    #loginBox button {
      width: 100%;
      padding: 8px;
      font-weight: bold;
    }

    #monthlyCount {
      font-weight: bold;
      margin: 15px 0;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <div id="loginBox">
    <h3>🔒 Login</h3>
    <input id="user" placeholder="Name">
    <input id="pass" type="password" placeholder="Passwort">
